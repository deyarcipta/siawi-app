name: siawi_app
version: 1.0.0+1
publish_to: none
description: A new Flutter project.
environment:
  sdk: ">=3.2.6 <4.0.0"

dependencies:
  cupertino_icons: ^1.0.2
  animated_text_kit: ^4.2.2
  percent_indicator: ^4.0.1
  custom_navigation_bar: ^0.8.2
  http: ^1.2.0
  get: 4.6.6
  accordion: ^2.6.0
  fluttertoast: ^8.2.5
  shared_preferences: ^2.2.2
  flutter:
    sdk: flutter
  cached_network_image: ^3.0.0
  # flutter_downloader: ^1.6.1
  url_launcher: ^6.2.4
  webview_flutter: ^4.7.0
  flutter_pdfview: ^1.2.7
  syncfusion_flutter_pdfviewer: ^25.1.42
  syncfusion_flutter_calendar: ^25.1.42
  syncfusion_flutter_core: ^25.1.42
  syncfusion_flutter_datepicker: ^25.1.42
  syncfusion_pdfviewer_platform_interface: ^25.2.7
  auto_size_text: ^3.0.0
  image_picker: ^1.0.4
  image_picker_windows: ^0.2.1+1
  intl: ^0.18.0
  qr_flutter: ^4.0.0
  flutter_svg: ^1.1.0

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/logo/
    - assets/images/
    - assets/icon/

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo/logo-launcher.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/logo/logo-launcher.png"
  # min_sdk_android: 34
  web:
    generate: true
    image_path: "assets/logo/logo-launcher.png"
    background_color: "#hexcode"
    theme_color: "#hexcode"
  windows:
    generate: true
    image_path: "assets/logo/logo-launcher.png"
    icon_size: 48
